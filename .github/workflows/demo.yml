name: Uruchom demo weryfikacji wieku

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Skonfiguruj Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Uruchom demo
        run: python3 age_verification_poc.py
